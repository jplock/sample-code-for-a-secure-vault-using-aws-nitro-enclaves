# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
# The `paste` advisory (RUSTSEC-2024-0436) that previously forced an
# ignore here was carried in via cel-interpreter 0.10.0. The renamed
# `cel` 0.13.0 crate switched to `pastey`, so the suppression is no
# longer needed. If a new transitive advisory needs ignoring later,
# add it here with an explicit reason.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
# Allow licenses observed in the workspace via `cargo deny list`.
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "Unicode-3.0",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "Unlicense",
  "LGPL-2.1-or-later",
]

[bans]
# Warn on duplicate versions rather than denying — the workspace has
# unavoidable transitive duplicates (e.g., http 0.2/1.x from AWS SDK,
# thiserror 1.x/2.x from cel vs parent). Flip to "deny" once the
# workspace is cleaned up.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
